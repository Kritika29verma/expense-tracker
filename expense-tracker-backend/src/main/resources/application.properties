# PostgreSQL Connection
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/expense_tracker}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server port (Render sets PORT automatically)
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:expense-tracker-super-secret-key-must-be-at-least-32-chars-long}
jwt.expiration-ms=86400000

# CORS allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
